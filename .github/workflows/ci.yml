name: CI

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Progesi.sln'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Progesi.sln'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            7.0.x

      - name: Restore
        run: dotnet restore Progesi.sln --nologo -p:UseNugetRhino=true

      - name: Build (Release, NuGet Rhino)
        run: dotnet build Progesi.sln -c Release --nologo --no-restore -p:UseNugetRhino=true

      - name: Test (TRX)
        run: dotnet test Progesi.sln -c Release --no-build --nologo -p:UseNugetRhino=true --logger "trx;LogFileName=tests.trx" --results-directory out\test-results

      - name: Upload TRX test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          if-no-files-found: warn
          path: out/test-results/**/*.trx
