name: CI

on:
  workflow_dispatch:
  push:
    branches: ['**']   # prima era solo main: così parte anche dai branch di lavoro
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Progesi.sln'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Progesi.sln'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            7.0.x

      - name: Restore
        run: dotnet restore Progesi.sln --nologo

      - name: Build (Release)
        run: dotnet build Progesi.sln -c Release --nologo --no-restore -p:UseNugetRhino=true

      - name: Test (TRX + cobertura if present)
        shell: pwsh
        run: |
          dotnet test Progesi.sln -c Release --no-build --nologo `
            --logger "trx;LogFileName=tests.trx" `
            --results-directory out\test-results

          # opzionale: se generi coverage altrove, caricalo
          $cov = Get-ChildItem -Recurse -Filter coverage.cobertura.xml -ErrorAction SilentlyContinue
          if ($cov) { "found" | Out-File -FilePath cov.flag -Encoding ascii }

      - name: Upload TRX test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          if-no-files-found: warn
          path: out/test-results/**/*.trx

      - name: Upload coverage (if found)
        if: hashFiles('cov.flag') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          if-no-files-found: warn
          path: |
            out/test-results/**/coverage.cobertura.xml
            coverage-html/**
