name: smoke

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Restore + publish con working-directory e path assoluti
      - name: Smoke restore
        shell: pwsh
        working-directory: tools/ProgesiSmoke
        run: dotnet restore ProgesiSmoke.csproj --nologo

      - name: Smoke publish
        shell: pwsh
        working-directory: tools/ProgesiSmoke
        run: |
          $ErrorActionPreference='Stop'
          $out = "$env:GITHUB_WORKSPACE/out/smoke/app"
          dotnet publish ProgesiSmoke.csproj -c Release -o "$out" --nologo --no-restore
          if (-not (Test-Path "$out/ProgesiSmoke.dll")) {
            throw "Smoke publish failed: DLL non trovata in $out"
          }

      # Esegui lo smoke MA non far fallire il job; se qualcosa va storto, crea un report minimale
      - name: Smoke run (non-bloccante)
        shell: pwsh
        continue-on-error: true
        run: |
          $ErrorActionPreference='Continue'
          $app    = "$env:GITHUB_WORKSPACE/out/smoke/app/ProgesiSmoke.dll"
          $report = "$env:GITHUB_WORKSPACE/out/smoke/smoke-report.txt"
          New-Item -ItemType Directory -Force -Path (Split-Path $report) | Out-Null
          if (Test-Path $app) {
            try {
              dotnet $app $report
            } catch {
              "Smoke P0 - $(Get-Date -Format s)Z  Result: FAIL`nDettagli: $($_.Exception.Message)" | Set-Content $report
            }
          } else {
            "Smoke P0 - $(Get-Date -Format s)Z  Result: FAIL`nDettagli: ProgesiSmoke.dll non trovato" | Set-Content $report
          }
          Write-Host "------ SMOKE REPORT ------"
          if (Test-Path $report) { Get-Content $report | Write-Host } else { Write-Host "(report non presente)" }
          Write-Host "--------------------------"

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          if-no-files-found: warn
          path: out/smoke/smoke-report.txt
