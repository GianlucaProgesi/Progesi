name: CodeQL

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths:
      - 'src/**'
      - 'Progesi.sln'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'src/**'
      - 'Progesi.sln'
      - '.github/workflows/codeql.yml'
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      # >>> FIX: flag anche qui <<<
      - name: Restore
        run: dotnet restore Progesi.sln --nologo -p:UseNugetRhino=true

      - name: Build (Release, NuGet Rhino)
        run: dotnet build Progesi.sln -c Release --nologo -p:UseNugetRhino=true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"
