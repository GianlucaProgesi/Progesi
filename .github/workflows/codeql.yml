name: CodeQL

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths:
      - 'src/**'
      - 'Progesi.sln'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'src/**'
      - 'Progesi.sln'
      - '.github/workflows/codeql.yml'
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Inizializza CodeQL in modalità buildless
      - name: Initialize CodeQL (buildless)
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          build-mode: none

      # Restore con il flag per i riferimenti condizionali (Rhino/Grasshopper via NuGet in CI)
      - name: Restore (buildless)
        run: dotnet restore Progesi.sln --nologo -p:UseNugetRhino=true

      # Analisi CodeQL (estrazione buildless per C#)
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        env:
          CODEQL_EXTRACTOR_CSHARP_BUILDLESS: true
        with:
          category: "/language:csharp"
