name: CodeQL (manual-only)

on:
  # Solo avvio manuale. Niente push/PR/schedule per adesso.
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Segnaposto per evitare rossi e sbloccare lo sviluppo.
      - name: Skip (temporary)
        run: |
          echo "CodeQL temporaneamente disabilitato per stabilizzare la CI."
          echo "Quando vogliamo, lo riattiviamo in un branch dedicato."
          exit 0
