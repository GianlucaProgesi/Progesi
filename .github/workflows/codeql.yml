name: CodeQL

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths:
      - 'src/**'
      - 'Progesi.sln'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'src/**'
      - 'Progesi.sln'
      - '.github/workflows/codeql.yml'
  schedule:
    - cron: '0 3 * * 1'   # Lunedì 03:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET (for analyzers if needed)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Modalità buildless: CodeQL non intercetta alcuna build
      - name: Initialize CodeQL (buildless)
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          build-mode: none

      # Analisi: in buildless l’estrazione non dipende da MSBuild
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"
        # Paracadute: se l’action inciampa, NON ti fallisce la pipeline
        continue-on-error: true
