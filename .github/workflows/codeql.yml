name: CodeQL

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths:
      - 'src/**'
      - 'Progesi.sln'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'src/**'
      - 'Progesi.sln'
      - '.github/workflows/codeql.yml'
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # MSBuild dei VS Build Tools (serve per net48 + tracciamento CodeQL)
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          # (opzionale) queries: security-extended

      # RESTORE con il flag (fondamentale per i PackageReference condizionali)
      - name: Restore (MSBuild)
        run: msbuild Progesi.sln /t:Restore /p:UseNugetRhino=true /p:Configuration=Release

      # BUILD con MSBuild (CodeQL intercetta la compilazione)
      - name: Build (MSBuild, NuGet Rhino)
        run: msbuild Progesi.sln /p:UseNugetRhino=true /p:Configuration=Release /nologo /m

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"
