name: CodeQL

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths:
      - 'src/**'
      - 'Progesi.sln'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'src/**'
      - 'Progesi.sln'
      - '.github/workflows/codeql.yml'
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # più robusto per CodeQL sulle soluzioni multi-progetto

      # MSBuild (necessario per net48 + tracing CodeQL)
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Initialize CodeQL (manual build mode)
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          build-mode: manual

      # Build TRACCIATA da CodeQL: /restore + flag UseNugetRhino=true
      - name: Build solution (MSBuild, NuGet Rhino)
        run: msbuild Progesi.sln /restore /m /nologo /p:Configuration=Release /p:UseNugetRhino=true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"
