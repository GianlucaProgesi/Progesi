name: CodeQL

on:
  # Avvio manuale quando vuoi
  workflow_dispatch:

  # Scansiona solo su main (evita rossi su branch di lavoro)
  push:
    branches: ['main']
    paths:
      - 'src/**'
      - 'Progesi.sln'
      - '.github/workflows/codeql.yml'

  pull_request:
    branches: ['main']
    paths:
      - 'src/**'
      - 'Progesi.sln'
      - '.github/workflows/codeql.yml'

  # Scansione settimanale su main
  schedule:
    - cron: '0 3 * * 1'   # lunedì 03:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: windows-latest
    # Se mai inciampa, NON blocca la pipeline (non regressivo per il flusso di lavoro)
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Modalità buildless: niente tracing MSBuild (robusto)
      - name: Initialize CodeQL (buildless)
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          build-mode: none
          # Scope sui progetti applicativi (dove ha senso)
          paths: |
            src/ProgesiCore/**
            src/ProgesiDataExchange/**
            src/ProgesiRepositories.Rhino/**
            src/ProgesiRepositories.Sqlite/**
            src/ProgesiRepositories.InMemory/**
          paths-ignore: |
            src/ProgesiGrasshopperAssembly/**
            src/ProgesiGrasshopperBrowsers/**

      # Restore solo per completezza (non compiliamo)
      - name: Restore (buildless)
        run: dotnet restore Progesi.sln --nologo -p:UseNugetRhino=true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        env:
          CODEQL_EXTRACTOR_CSHARP_BUILDLESS: true
        with:
          category: "/language:csharp"
