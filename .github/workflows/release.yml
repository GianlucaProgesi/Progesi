name: release

on:
  workflow_dispatch:
  push:
    tags: ['v*']   # rilascia su tag v*

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build + Pack (plugin zip)
        shell: pwsh
        run: |
          dotnet restore Progesi.sln --nologo
          dotnet build Progesi.sln -c Release --nologo -p:UseNugetRhino=true
          ./tools/Publish-Plugin.ps1 -Configuration Release

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
