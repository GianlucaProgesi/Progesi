name: PR Labeler
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
jobs:
  label:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
