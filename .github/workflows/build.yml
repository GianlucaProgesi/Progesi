name: build-and-pack

on:
  workflow_dispatch:
  push:
    branches: ['**']
    tags:     ['v*']
  pull_request:
    branches: ['**']

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- JOB 1: build + test + pack ----------
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            7.0.x

      - name: Cache NuGet (v3-cache)
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\NuGet\v3-cache
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json', '**/*.props', '**/*.targets') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache NuGet packages (~/.nuget/packages)
        uses: actions/cache@v4
        with:
          path: ~\.nuget\packages
          key: pkgs-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            pkgs-${{ runner.os }}-

      # restore con il flag (fondamentale con i riferimenti condizionali)
      - name: Restore
        run: dotnet restore Progesi.sln --nologo -p:UseNugetRhino=true

      - name: Build Release (NuGet Rhino in CI)
        run: dotnet build Progesi.sln -c Release --nologo --no-restore -p:UseNugetRhino=true

      - name: Test (Release)
        run: dotnet test Progesi.sln -c Release --no-build --nologo -p:UseNugetRhino=true --logger "trx;LogFileName=tests.trx" --results-directory out\test-results

      - name: Package plugin (zip)
        shell: pwsh
        run: ./tools/Publish-Plugin.ps1 -Configuration Release

      - name: Upload artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: progesi-plugin
          path: out/*.zip

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          if-no-files-found: warn
          path: out/test-results/**/*.trx

  # ---------- JOB 2: smoke (isolato) ----------
  smoke:
    runs-on: windows-latest
    needs: build
    continue-on-error: true   # ← togli questa riga quando vediamo stabilità

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # stesse cache del job build → restore stabile e veloce
      - name: Cache NuGet (v3-cache)
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\NuGet\v3-cache
          key: nuget-${{ runner.os }}-${{ hashFiles('tools/ProgesiSmoke/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache NuGet packages (~/.nuget/packages)
        uses: actions/cache@v4
        with:
          path: ~\.nuget\packages
          key: pkgs-${{ runner.os }}-${{ hashFiles('tools/ProgesiSmoke/*.csproj') }}
          restore-keys: |
            pkgs-${{ runner.os }}-

      # publish + run con working-directory e path assoluti
      - name: Smoke restore
        shell: pwsh
        working-directory: tools/ProgesiSmoke
        run: dotnet restore ProgesiSmoke.csproj --nologo

      - name: Smoke publish
        shell: pwsh
        working-directory: tools/ProgesiSmoke
        run: |
          $ErrorActionPreference='Stop'
          $out = "$env:GITHUB_WORKSPACE/out/smoke/app"
          dotnet publish ProgesiSmoke.csproj -c Release -o "$out" --nologo --no-restore
          if (-not (Test-Path "$out/ProgesiSmoke.dll")) { throw "Smoke publish failed: DLL non trovata in $out" }

      - name: Smoke run
        shell: pwsh
        run: |
          $ErrorActionPreference='Stop'
          $app    = "$env:GITHUB_WORKSPACE/out/smoke/app/ProgesiSmoke.dll"
          $report = "$env:GITHUB_WORKSPACE/out/smoke/smoke-report.txt"
          if (-not (Test-Path $app))    { throw "Smoke app non trovata: $app" }
          dotnet $app $report
          if (-not (Test-Path $report)) { throw "Smoke report non trovato: $report" }
          Write-Host "------ SMOKE REPORT ------"
          Get-Content $report | Write-Host
          Write-Host "--------------------------"

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          if-no-files-found: warn
          path: out/smoke/smoke-report.txt
