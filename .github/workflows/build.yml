name: build-and-pack

on:
  workflow_dispatch:
  push:
    branches: ['**']
    tags:     ['v*']
  pull_request:
    branches: ['**']

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            7.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\NuGet\v3-cache
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json', '**/*.props', '**/*.targets') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # >>> FIX: passiamo il flag anche al RESTORE <<<
      - name: Restore
        run: dotnet restore Progesi.sln --nologo -p:UseNugetRhino=true

      - name: Build Release (NuGet Rhino in CI)
        run: dotnet build Progesi.sln -c Release --nologo --no-restore -p:UseNugetRhino=true

      - name: Test (Release)
        run: dotnet test Progesi.sln -c Release --no-build --nologo -p:UseNugetRhino=true --logger "trx;LogFileName=tests.trx" --results-directory out\test-results

      - name: Package plugin (zip)
        shell: pwsh
        run: ./tools/Publish-Plugin.ps1 -Configuration Release

      - name: Upload artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: progesi-plugin
          path: out/*.zip

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          if-no-files-found: warn
          path: out/test-results/**/*.trx

      # ===== S2-A: Smoke P0 (.NET, senza sqlite3.exe) =====
      - name: Smoke P0 (.NET)
        run: dotnet run --project tools/ProgesiSmoke/ProgesiSmoke.csproj -c Release -- out\smoke\smoke-report.txt

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          if-no-files-found: warn
          path: out/smoke/smoke-report.txt

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            out/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
